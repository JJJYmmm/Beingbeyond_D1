retargeting:
  type: DexPilot
  urdf_path: d1_hand/left/d1_hand_left.urdf

  # Target refers to the retargeting target, which is the robot hand
  target_joint_names: ["thumb_cmc_pitch", "thumb_cmc_yaw", "index_mcp_pitch",
                        "middle_mcp_pitch", "ring_mcp_pitch", "pinky_mcp_pitch"]
  wrist_link_name: "hand_base_link"
  finger_tip_link_names: [ "thumb_tip", "index_tip", "middle_tip", "ring_tip", "pinky_tip"]
  scaling_factor: 1.5

  # A smaller alpha means stronger filtering, i.e. more smooth but also larger latency
  low_pass_alpha: 0.2
